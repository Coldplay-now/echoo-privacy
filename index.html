<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小回声 Echoo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
            background: #f7f2ee;
            color: #403836;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            padding: 56px 32px;
            text-align: center;
        }
        .title {
            font-size: 34px;
            font-weight: 600;
            color: #945c50;
            margin-bottom: 6px;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 13px;
            color: #9e8e88;
            margin-bottom: 36px;
            letter-spacing: 1px;
        }
        .desc {
            font-size: 16px;
            line-height: 1.9;
            color: #6b5b56;
            margin-bottom: 32px;
        }
        .tagline {
            font-size: 14px;
            color: #9e8e88;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        .tagline span {
            display: inline-block;
            margin: 0 4px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .links a {
            display: block;
            padding: 14px;
            border-radius: 12px;
            background: #fff;
            color: #945c50;
            text-decoration: none;
            font-size: 15px;
            transition: background 0.2s;
        }
        .links a:hover { background: #f0e6e0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">小回声</div>
        <div class="subtitle">Echoo</div>
        <p class="desc">
            一个很轻的情绪整理仪式。<br>
            不给答案，只帮你把模糊的感觉说清楚。
        </p>
        <p class="tagline">
            450 张温柔的提问 · 9 个情绪主题<br>
            完全离线 · 不收集任何数据
        </p>
        <div class="links">
            <a href="privacy.html">隐私政策 Privacy Policy</a>
            <a href="support.html">帮助与支持 Support</a>
        </div>
    </div>
</body>
</html>
